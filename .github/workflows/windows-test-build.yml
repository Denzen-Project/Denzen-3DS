name: Windows Test Build

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

concurrency:
  group: windows-test-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-mxe:
    name: Windows x64 MXE
    runs-on: ubuntu-latest
    container:
      image: opensauce04/azahar-build-environment:latest
      options: -u 1001
    defaults:
      run:
        shell: bash
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPILERCHECK: content
      CCACHE_SLOPPINESS: time_macros
      OS: windows
      TARGET: mxe
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: windows-mxe-${{ github.sha }}
          restore-keys: |
            windows-mxe-

      - name: Disable line ending translation
        run: git config --global core.autocrlf input

      - name: Build Windows bundle with MXE
        run: ./.ci/mxe.sh

      - name: Write build manifest
        run: |
          set -euo pipefail
          mkdir -p build/bundle artifacts
          cat > build/DENZEN-BUILD-MANIFEST.txt <<EOF
          Denzen build manifest
          repository=${GITHUB_REPOSITORY}
          workflow=${GITHUB_WORKFLOW}
          run_id=${GITHUB_RUN_ID}
          run_number=${GITHUB_RUN_NUMBER}
          ref=${GITHUB_REF}
          ref_type=${GITHUB_REF_TYPE}
          ref_name=${GITHUB_REF_NAME}
          commit=${GITHUB_SHA}
          build_path=github-actions-mxe
          builder_script=.ci/mxe.sh
          target=windows-mxe
          built_at_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF
          cp build/DENZEN-BUILD-MANIFEST.txt build/bundle/DENZEN-BUILD-MANIFEST.txt

      - name: Pack artifact
        run: ./.ci/pack.sh

      - name: Preserve build manifest
        run: cp build/DENZEN-BUILD-MANIFEST.txt artifacts/denzen-build-manifest-${{ github.sha }}.txt

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: denzen-emu-windows-mxe-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub release
    needs: windows-mxe
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v7
        with:
          name: denzen-emu-windows-mxe-${{ github.sha }}
          path: release-artifacts/windows-mxe

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files

          while IFS= read -r -d '' file; do
            rel="${file#release-artifacts/}"
            asset="${rel//\//-}"
            cp "$file" "release-files/$asset"
          done < <(find release-artifacts -type f -print0)

          asset_count=$(find release-files -maxdepth 1 -type f | wc -l)
          if [ "$asset_count" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi

          find release-files -maxdepth 1 -type f -print | sort

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          cat > release-notes.md <<EOF
          Automated Denzen Windows MXE build for ${TAG_NAME}.

          Built from commit ${GITHUB_SHA} by the Windows Test Build workflow.
          Build path: GitHub Actions MXE using .ci/mxe.sh.
          EOF

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-files/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" release-files/* \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$TAG_NAME" \
              --notes-file release-notes.md
          fi
